services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ossearch
      POSTGRES_PASSWORD: ossearch_dev
      POSTGRES_DB: ossearch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ossearch"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://ossearch:ossearch_dev@db:5432/ossearch
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
